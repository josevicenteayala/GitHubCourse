name: AI PR Review

on:
  workflow_call:
    inputs:
      step:
        description: "Step ID (e.g. step-01)"
        required: true
        type: string
      pr_number:
        description: "Pull request number"
        required: true
        type: number
      repo:
        description: "Repository full name (owner/repo)"
        required: true
        type: string
      base_ref:
        description: "Base branch name for diff"
        required: true
        type: string
      head_sha:
        description: "Head commit SHA for diff"
        required: true
        type: string
    outputs:
      verdict:
        description: "AI review verdict: PASS or FAIL"
        value: ${{ jobs.review.outputs.verdict }}

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    outputs:
      verdict: ${{ steps.ai_review.outputs.verdict }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openai

      - name: Post missing-step notice
        if: inputs.step == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/post_comment.py \
            --repo "${{ inputs.repo }}" \
            --pr "${{ inputs.pr_number }}" \
            --marker "ai-review-step-detection" \
            --body "⚠️ **Could not detect a step identifier.**

          Please use a branch name starting with \`step-XX\` (e.g. \`step-01/my-feature\`)
          or add a label like \`step-01\` to this PR."

      - name: Generate diff
        if: inputs.step != ''
        run: |
          git diff origin/${{ inputs.base_ref }}...${{ inputs.head_sha }} > /tmp/diff.txt

      - name: Run AI review agent
        if: inputs.step != ''
        id: ai_review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODELS_API_KEY: ${{ secrets.MODELS_API_KEY }}
        run: |
          set +e
          OUTPUT=$(python3 scripts/agent_reviewer.py \
            /tmp/diff.txt \
            "${{ inputs.step }}" \
            "${{ inputs.pr_number }}" \
            "${{ inputs.repo }}" 2>&1)
          EXIT_CODE=$?
          set -e

          echo "$OUTPUT"

          # Parse VERDICT from agent output
          VERDICT=$(echo "$OUTPUT" | grep -oP '^VERDICT=\K(PASS|FAIL)$' || echo "FAIL")
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

          # Exit code 2 = FAIL verdict (not a workflow error)
          if [ "$EXIT_CODE" = "2" ]; then
            echo "AI review verdict: FAIL"
          elif [ "$EXIT_CODE" != "0" ]; then
            echo "AI review agent error (exit code $EXIT_CODE)"
            exit 1
          fi

      - name: Request Copilot review
        if: inputs.step != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ inputs.repo }}/pulls/${{ inputs.pr_number }}/requested_reviewers" \
            -f '{"reviewers":["copilot"]}'  2>/dev/null || echo "Copilot reviewer request skipped (may not be available)"
