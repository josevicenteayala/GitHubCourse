name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests openai

      - name: Detect step from labels or branch
        id: detect
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
          BRANCH: ${{ github.head_ref }}
        run: |
          # Priority 1: Check PR labels for step-XX pattern
          STEP=$(echo "$LABELS_JSON" | python3 -c "
          import json, sys, re
          labels = json.load(sys.stdin)
          for label in labels:
              m = re.match(r'^(step-\d+)', label)
              if m:
                  print(m.group(1))
                  sys.exit(0)
          " 2>/dev/null || true)

          # Priority 2: Extract from branch name
          if [ -z "$STEP" ]; then
            STEP=$(echo "$BRANCH" | grep -oE '^step-[0-9]+' || true)
          fi

          if [ -z "$STEP" ]; then
            echo "step=" >> "$GITHUB_OUTPUT"
            echo "detected=false" >> "$GITHUB_OUTPUT"
          else
            echo "step=$STEP" >> "$GITHUB_OUTPUT"
            echo "detected=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post missing-step notice
        if: steps.detect.outputs.detected == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/post_comment.py \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --marker "ai-review-step-detection" \
            --body "⚠️ **Could not detect a step identifier.**

          Please use a branch name starting with \`step-XX\` (e.g. \`step-01/my-feature\`)
          or add a label like \`step-01\` to this PR."

      - name: Run step evaluation
        if: steps.detect.outputs.detected == 'true'
        id: evaluate
        run: |
          set +e
          OUTPUT=$(python3 scripts/evaluate.py --step "${{ steps.detect.outputs.step }}" 2>&1)
          EXIT_CODE=$?
          set -e

          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          # Write output to file for the comment step
          echo "$OUTPUT" > /tmp/eval_output.txt

      - name: Post evaluation results
        if: steps.detect.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STEP="${{ steps.detect.outputs.step }}"
          EXIT_CODE="${{ steps.evaluate.outputs.exit_code }}"

          if [ "$EXIT_CODE" = "0" ]; then
            STATUS="✅ **All checks passed for \`$STEP\`**"
          else
            STATUS="❌ **Some checks failed for \`$STEP\`**"
          fi

          EVAL_OUTPUT=$(cat /tmp/eval_output.txt)

          python3 scripts/post_comment.py \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --marker "ai-review-evaluation" \
            --body "$STATUS

          <details>
          <summary>Evaluation Output</summary>

          \`\`\`
          $EVAL_OUTPUT
          \`\`\`

          </details>"

      - name: Generate diff
        if: steps.detect.outputs.detected == 'true'
        run: |
          git diff origin/${{ github.base_ref }}...${{ github.sha }} > /tmp/diff.txt

      - name: Run AI review agent
        if: steps.detect.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODELS_API_KEY: ${{ secrets.MODELS_API_KEY }}
        run: |
          python3 scripts/agent_reviewer.py \
            /tmp/diff.txt \
            "${{ steps.detect.outputs.step }}" \
            "${{ github.event.pull_request.number }}" \
            "${{ github.repository }}"

      - name: Request Copilot review
        if: steps.detect.outputs.detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
        run: |
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/requested_reviewers" \
            -f '{"reviewers":["copilot"]}'  2>/dev/null || echo "Copilot reviewer request skipped (may not be available)"
