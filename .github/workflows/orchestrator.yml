name: PR Pipeline

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Step 1: Run unit tests & evidence checks ──────────────────────────
  evaluate:
    uses: ./.github/workflows/evaluate.yml
    secrets: inherit

  # ── Post evaluation results as PR comment ──────────────────────────────
  post-eval-results:
    needs: evaluate
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Post evaluation comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STEP="${{ needs.evaluate.outputs.step }}"
          STATUS="${{ needs.evaluate.outputs.status }}"

          if [ "$STATUS" = "pass" ]; then
            HEADER="✅ **All checks passed for \`$STEP\`**"
          else
            HEADER="❌ **Some checks failed for \`$STEP\`**"
          fi

          python3 scripts/post_comment.py \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --marker "ai-review-evaluation" \
            --body "$HEADER

          <details>
          <summary>Evaluation Output</summary>

          \`\`\`
          ${{ needs.evaluate.outputs.eval_output }}
          \`\`\`

          </details>"

  # ── Step 2: Run AI review ──────────────────────────────────────────────
  ai-review:
    needs: [evaluate, post-eval-results]
    if: needs.evaluate.outputs.status == 'pass'
    uses: ./.github/workflows/ai-review.yml
    with:
      step: ${{ needs.evaluate.outputs.step }}
      pr_number: ${{ github.event.pull_request.number }}
      repo: ${{ github.repository }}
      base_ref: ${{ github.base_ref }}
      head_sha: ${{ github.event.pull_request.head.sha }}
      eval_output: ${{ needs.evaluate.outputs.eval_output }}
    secrets: inherit

  # ── Step 3: Record approved PR to persistent storage ───────────────────
  record:
    needs: [evaluate, ai-review]
    if: needs.ai-review.outputs.verdict == 'PASS'
    uses: ./.github/workflows/record-merge.yml
    with:
      pr_id: ${{ github.event.pull_request.number }}
      title: ${{ github.event.pull_request.title }}
      author: ${{ github.event.pull_request.user.login }}
      step: ${{ needs.evaluate.outputs.step }}
      status: ${{ needs.evaluate.outputs.status }}
    secrets: inherit
